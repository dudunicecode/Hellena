<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galáxia do Amor 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:sans-serif}
canvas{position:fixed;top:0;left:0;z-index:0}

/* INTRO */
#intro{
  position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at center,#1a0010 0%,#000 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.5s ease;
}
#intro.hide{opacity:0;pointer-events:none}

.intro-card{
  background:rgba(80,0,20,0.4);
  border:1px solid rgba(255,30,80,0.3);
  border-radius:20px;
  padding:40px 50px;
  text-align:center;
  max-width:340px;
  width:88vw;
}
.intro-title{
  font-family:'Dancing Script',cursive;
  font-size:clamp(36px,10vw,56px);
  color:#fff;
  text-shadow:0 0 30px rgba(255,0,80,0.8),0 0 60px rgba(255,0,40,0.4);
  margin-bottom:16px;
}
.intro-img{font-size:80px;display:block;margin:0 auto 16px;animation:pulse 2s ease-in-out infinite}
.intro-sub{
  font-size:14px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,180,200,0.7);margin-bottom:30px;
}
.start-btn{
  padding:12px 36px;border-radius:30px;
  background:linear-gradient(135deg,#cc0030,#880020);
  border:none;color:#fff;
  font-size:15px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all 0.3s;
  box-shadow:0 0 20px rgba(255,0,50,0.4);
}
.start-btn:hover{box-shadow:0 0 40px rgba(255,0,50,0.7);transform:scale(1.05)}

/* LETTER POPUP */
#letter{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.75);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.5s;
}
#letter.open{opacity:1;pointer-events:all}
.letter-box{
  background:radial-gradient(ellipse at top,#2a0015,#0d0005);
  border:1px solid rgba(255,50,100,0.4);
  border-radius:20px;
  padding:36px 32px;
  max-width:360px;width:88vw;
  text-align:center;
  transform:scale(0.85);transition:transform 0.4s;
  box-shadow:0 0 60px rgba(200,0,60,0.3);
}
#letter.open .letter-box{transform:scale(1)}
.lheart{font-size:36px;display:block;margin-bottom:12px;animation:pulse 1.2s infinite}
.letter-img{
  width:160px;height:160px;border-radius:16px;object-fit:cover;
  margin:0 auto 16px;display:block;
  border:2px solid rgba(255,50,100,0.4);
  box-shadow:0 0 30px rgba(255,0,60,0.3);
}
.letter-img-placeholder{
  width:160px;height:160px;border-radius:16px;
  background:radial-gradient(#3a0020,#1a0010);
  border:2px solid rgba(255,50,100,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:60px;margin:0 auto 16px;
}
.letter-name{
  font-family:'Dancing Script',cursive;
  font-size:28px;color:#fff;
  text-shadow:0 0 20px rgba(255,50,100,0.8);
  margin-bottom:6px;
}
.letter-msg{
  font-size:14px;color:rgba(255,200,220,0.8);
  line-height:1.7;margin-bottom:20px;font-style:italic;
}
.close-btn{
  padding:9px 28px;border-radius:25px;
  border:1px solid rgba(255,50,100,0.5);
  background:transparent;color:rgba(255,180,200,0.9);
  font-size:13px;letter-spacing:1.5px;cursor:pointer;
  transition:all 0.3s;
}
.close-btn:hover{background:rgba(200,0,60,0.3);box-shadow:0 0 20px rgba(255,0,60,0.4)}

/* HEART CLICK BUTTON */
#heart-btn{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  z-index:50;
  font-size:32px;cursor:pointer;
  animation:pulse 1.5s ease-in-out infinite;
  background:none;border:none;
  display:none;
}
#heart-btn.show{display:block}

/* FLOATING HEART */
.fheart{
  position:fixed;pointer-events:none;z-index:30;
  animation:floatUp 2.5s ease-out forwards;
  font-size:20px;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1}
  100%{transform:translateY(-300px) scale(0.2) rotate(30deg);opacity:0}
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.12)}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- TELA INICIAL -->
<div id="intro">
  <div class="intro-card">
    <div class="intro-title">Galaxy Love</div>
    <span class="intro-img">🐰</span>
    <div class="intro-sub">LOVE</div>
    <button class="start-btn" onclick="startGalaxy()">INICIAR</button>
  </div>
</div>

<!-- CARTA DE AMOR -->
<div id="letter">
  <div class="letter-box">
    <span class="lheart">❤️</span>
    <div class="letter-img-placeholder" id="couple-img">💑</div>
    <div class="letter-name" id="letter-name">Amor de mi Vida</div>
    <div class="letter-msg" id="letter-msg">Cuanto más tiempo estamos juntos, más te amo.</div>
    <button class="close-btn" onclick="closeLetter()">CERRAR ✦</button>
  </div>
</div>

<!-- BOTÃO CORAÇÃO -->
<button id="heart-btn" onclick="openLetter()">💌</button>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W,H,t=0,running=false;

// ─── PARTÍCULAS DE ESPIRAL ───
const spiralParts = [];
const floatHearts = [];
const textParticles = [];
const bgHearts = [];

const LOVE_TEXTS = ['TE AMO','AMOR ETERNO','INFINITO ∞','MY LOVE','AMOR DE MI VIDA'];

function resize(){
  W=C.width=window.innerWidth;
  H=C.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

function initParticles(){
  spiralParts.length=0;
  bgHearts.length=0;
  textParticles.length=0;

  // Espiral partículas
  for(let i=0;i<220;i++){
    const arm = Math.floor(Math.random()*2);
    const pct = Math.random();
    spiralParts.push({
      pct,arm,
      r: 60 + pct*Math.min(W,H)*0.38,
      speed: 0.0006 + pct*0.0003,
      angle: pct*Math.PI*5 + arm*Math.PI,
      size: 1.5+Math.random()*3,
      alpha: 0.3+Math.random()*0.6,
      color: Math.random()<0.6
        ? `rgba(${200+Math.floor(Math.random()*55)},${Math.floor(Math.random()*30)},${Math.floor(Math.random()*40)},`
        : `rgba(${200+Math.floor(Math.random()*55)},${40+Math.floor(Math.random()*40)},${80+Math.floor(Math.random()*60)},`,
      pulse: Math.random()*Math.PI*2,
      pspeed: 0.02+Math.random()*0.03
    });
  }

  // Corações de fundo flutuantes
  for(let i=0;i<18;i++){
    bgHearts.push({
      x: Math.random()*W,
      y: Math.random()*H,
      size: 12+Math.random()*28,
      speed: 0.2+Math.random()*0.5,
      alpha: 0.05+Math.random()*0.15,
      drift: (Math.random()-0.5)*0.3,
      rot: Math.random()*Math.PI*2
    });
  }

  // Textos orbitando
  for(let i=0;i<14;i++){
    const arm = i%2;
    const pct = (i/14);
    textParticles.push({
      text: LOVE_TEXTS[i%LOVE_TEXTS.length],
      angle: pct*Math.PI*4 + arm*Math.PI + Math.random()*0.5,
      r: 90 + pct*Math.min(W,H)*0.32,
      speed: 0.0004 + Math.random()*0.0003,
      alpha: 0.5+Math.random()*0.4,
      size: 9+Math.random()*5,
      arm
    });
  }
}

// ─── DESENHO DO CORAÇÃO 3D ───
function drawHeart(cx,cy,size,t){
  ctx.save();
  ctx.translate(cx,cy);

  // Sombra/glow base
  const glow = ctx.createRadialGradient(0,size*0.1,0,0,size*0.1,size*1.1);
  glow.addColorStop(0,'rgba(180,0,30,0.35)');
  glow.addColorStop(0.5,'rgba(120,0,20,0.15)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(0,size*0.1,size*1.1,0,Math.PI*2);ctx.fill();

  // Coração principal — feito de pontos (como o original)
  const numPts = 800;
  for(let i=0;i<numPts;i++){
    const angle = (i/numPts)*Math.PI*2;
    const px = 16*Math.pow(Math.sin(angle),3);
    const py = -(13*Math.cos(angle)-5*Math.cos(2*angle)-2*Math.cos(3*angle)-Math.cos(4*angle));
    const sc = size/16;
    const jitter = (Math.random()-0.5)*1.2;
    const brightness = 0.5+Math.random()*0.5;
    const r=Math.floor(180+brightness*75);
    const g=Math.floor(Math.random()*25);
    const b=Math.floor(Math.random()*35);
    ctx.fillStyle=`rgba(${r},${g},${b},${0.5+Math.random()*0.5})`;
    ctx.fillRect(px*sc+jitter, py*sc+jitter, 1.5, 1.5);
  }

  // Borda luminosa do coração
  ctx.lineWidth=1.5;
  ctx.strokeStyle='rgba(255,80,80,0.5)';
  ctx.shadowColor='rgba(255,0,0,0.8)';
  ctx.shadowBlur=12;
  ctx.beginPath();
  for(let i=0;i<=200;i++){
    const angle=(i/200)*Math.PI*2;
    const px=16*Math.pow(Math.sin(angle),3);
    const py=-(13*Math.cos(angle)-5*Math.cos(2*angle)-2*Math.cos(3*angle)-Math.cos(4*angle));
    const sc=size/16;
    if(i===0) ctx.moveTo(px*sc,py*sc); else ctx.lineTo(px*sc,py*sc);
  }
  ctx.stroke();
  ctx.shadowBlur=0;
  ctx.restore();
}

// ─── BURACO NEGRO ───
function drawBlackHole(cx,cy,r){
  // Anel externo brilhante
  const ring=ctx.createRadialGradient(cx,cy,r*0.4,cx,cy,r*1.3);
  ring.addColorStop(0,'rgba(0,0,0,0)');
  ring.addColorStop(0.6,'rgba(150,0,20,0.35)');
  ring.addColorStop(0.85,'rgba(255,40,60,0.15)');
  ring.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ring;
  ctx.beginPath();ctx.arc(cx,cy,r*1.3,0,Math.PI*2);ctx.fill();

  // Centro negro
  const core=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  core.addColorStop(0,'rgba(0,0,0,1)');
  core.addColorStop(0.7,'rgba(5,0,0,1)');
  core.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=core;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();

  // Olho no centro
  ctx.save();
  ctx.translate(cx,cy);
  // branco do olho
  ctx.fillStyle='rgba(220,200,210,0.9)';
  ctx.beginPath();
  ctx.ellipse(0,0,r*0.55,r*0.28,0,0,Math.PI*2);
  ctx.fill();
  // pupila
  const pupil=ctx.createRadialGradient(0,0,0,0,0,r*0.18);
  pupil.addColorStop(0,'#1a0005');
  pupil.addColorStop(1,'#000');
  ctx.fillStyle=pupil;
  ctx.beginPath();ctx.arc(0,0,r*0.18,0,Math.PI*2);ctx.fill();
  // brilho olho
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();ctx.arc(-r*0.06,-r*0.06,r*0.05,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ─── ESPIRAL ───
function drawSpiral(cx,cy,tt){
  spiralParts.forEach(p=>{
    p.angle += p.speed;
    p.pulse += p.pspeed;
    const x = cx + Math.cos(p.angle)*p.r;
    const y = cy + Math.sin(p.angle)*p.r*0.38; // achatado = perspectiva
    const a = p.alpha*(0.7+Math.sin(p.pulse)*0.3);
    ctx.beginPath();
    ctx.arc(x,y,p.size*(0.8+Math.sin(p.pulse)*0.2),0,Math.PI*2);
    ctx.fillStyle=p.color+a+')';
    ctx.fill();
  });
}

// ─── TEXTOS ORBITANDO ───
function drawTexts(cx,cy){
  ctx.save();
  textParticles.forEach(tp=>{
    tp.angle += tp.speed;
    const x = cx + Math.cos(tp.angle)*tp.r;
    const y = cy + Math.sin(tp.angle)*tp.r*0.38;
    // só mostra se não estiver "atrás" do centro (simula 3D)
    const depth = Math.sin(tp.angle); // -1 = atrás, 1 = frente
    const alpha = tp.alpha * (0.3 + (depth+1)*0.35);
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(tp.angle+Math.PI*0.5);
    ctx.font=`${tp.size}px 'Dancing Script',cursive`;
    ctx.fillStyle=`rgba(255,${120+Math.floor(depth*60)},${140+Math.floor(depth*60)},${alpha})`;
    ctx.shadowColor='rgba(255,0,50,0.6)';
    ctx.shadowBlur=6;
    ctx.fillText(tp.text,0,0);
    ctx.shadowBlur=0;
    ctx.restore();
  });
  ctx.restore();
}

// ─── CORAÇÕES BG ───
function drawBgHearts(){
  bgHearts.forEach(h=>{
    h.y -= h.speed;
    h.x += h.drift;
    if(h.y<-50){h.y=H+50;h.x=Math.random()*W}
    ctx.save();
    ctx.translate(h.x,h.y);
    ctx.rotate(h.rot);
    ctx.font=`${h.size}px serif`;
    ctx.globalAlpha=h.alpha;
    ctx.fillStyle='#ff1040';
    ctx.fillText('♥',0,0);
    ctx.globalAlpha=1;
    ctx.restore();
  });
}

// ─── LOOP PRINCIPAL ───
function loop(){
  if(!running) return;
  ctx.clearRect(0,0,W,H);

  // Fundo
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bg.addColorStop(0,'#1a0008');
  bg.addColorStop(0.4,'#0d0005');
  bg.addColorStop(1,'#000');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // Rosa/magenta glow nas bordas
  const edgeGlow=ctx.createRadialGradient(W/2,H,0,W/2,H,W*0.7);
  edgeGlow.addColorStop(0,'rgba(180,0,80,0.18)');
  edgeGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=edgeGlow;
  ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H/2;
  const bhR = Math.min(W,H)*0.045;
  const heartSize = Math.min(W,H)*0.18;

  drawBgHearts();
  drawSpiral(cx,cy,t);
  drawTexts(cx,cy);

  // Coração acima do centro
  const heartY = cy - Math.min(W,H)*0.22;
  drawHeart(cx, heartY, heartSize, t);

  // Brilho conectando coração ao buraco negro
  const grad=ctx.createLinearGradient(cx,heartY+heartSize*0.6,cx,cy-bhR);
  grad.addColorStop(0,'rgba(255,30,60,0.3)');
  grad.addColorStop(1,'rgba(255,30,60,0)');
  ctx.fillStyle=grad;
  ctx.fillRect(cx-2,heartY+heartSize*0.6,4,cy-bhR-(heartY+heartSize*0.6));

  drawBlackHole(cx,cy,bhR);

  t++;
  requestAnimationFrame(loop);
}

// ─── CONTROLE ───
function startGalaxy(){
  document.getElementById('intro').classList.add('hide');
  setTimeout(()=>{
    document.getElementById('heart-btn').classList.add('show');
    running=true;
    initParticles();
    loop();
  },800);
}

function openLetter(){
  document.getElementById('letter').classList.add('open');
  // dispara corações
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      const h=document.createElement('div');
      h.className='fheart';
      h.textContent=['❤️','💕','💗','💖','🌹'][Math.floor(Math.random()*5)];
      h.style.left=Math.random()*90+'vw';
      h.style.bottom='10vh';
      h.style.fontSize=(16+Math.random()*20)+'px';
      h.style.animationDuration=(2+Math.random())+'s';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),3000);
    },i*100);
  }
}
function closeLetter(){
  document.getElementById('letter').classList.remove('open');
}
document.getElementById('letter').addEventListener('click',e=>{
  if(e.target===document.getElementById('letter')) closeLetter();
});
</script>
</body>
</html>
